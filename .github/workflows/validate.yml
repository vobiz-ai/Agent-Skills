name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify Skills CLI discovery
        env:
          DISABLE_TELEMETRY: "1"
        run: npx --yes skills add . --list
